version = "1.0"

[metadata]
author_name = "QP-EFT Benchmark"
author_email = "noreply@example.com"
difficulty_explanation = "Apply the given frozen-core quasiparticle correction. The formula AND the core form factors are provided; wire up DFTK with the pinned setup, extract the Bloch coefficients, assemble the state-dependent renormalization, and beat bare KS against held-out ARPES on concealed metals. Tests correct DFT plumbing and generalization."
category = "scientific-computing"
tags = ["physics", "dft", "dftk", "quasiparticle", "frozen-core", "julia", "level-1"]

# DFTK SCF + bands on the two hidden metals (K, Mg) take a few minutes each.
[verifier]
timeout_sec = 2400.0

# Generous: exploration involves repeated DFTK runs (each fresh Julia process
# pays ~tens of seconds of load/JIT on top of the SCF).
[agent]
timeout_sec = 7200.0

# Building the image instantiates + precompiles DFTK and pre-fetches artifacts.
[environment]
build_timeout_sec = 3600.0
