version = "1.0"

[metadata]
author_name = "QP-EFT Benchmark"
author_email = "noreply@example.com"
difficulty_explanation = "Reconstruct and implement the frozen-core quasiparticle band correction. The agent must run DFTK Kohn-Sham bands with a pinned setup, compute the core form factor from provided atomic data (the closed-form correction is given; the form factor is not), assemble the state-dependent renormalization, and beat bare KS against held-out ARPES on concealed metals."
category = "scientific-computing"
tags = ["physics", "dft", "dftk", "quasiparticle", "frozen-core", "julia", "level-2"]

# DFTK SCF + bands on the two hidden metals (K, Mg) take a few minutes each.
[verifier]
timeout_sec = 2400.0

# Generous: exploration involves repeated DFTK runs (each fresh Julia process
# pays ~tens of seconds of load/JIT on top of the SCF).
[agent]
timeout_sec = 7200.0

# Building the image instantiates + precompiles DFTK and pre-fetches artifacts.
[environment]
build_timeout_sec = 3600.0
